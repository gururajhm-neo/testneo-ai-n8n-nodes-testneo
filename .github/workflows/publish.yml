name: Publish n8n-nodes-testneo

on:
  push:
    tags:
      - '0.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Do NOT set registry-url — it writes always-auth + empty _authToken
      # which breaks Trusted Publisher OIDC (npm returns 404).
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Show Node / npm
        run: node -v && npm -v

      - name: Test and build
        run: npm test

      - name: Clear legacy npm auth (force OIDC)
        run: |
          npm config delete always-auth || true
          npm config delete '//registry.npmjs.org/:_authToken' || true
          rm -f .npmrc "$HOME/.npmrc" || true
          echo "npm config (auth-related):"
          npm config list -l | grep -E 'auth|registry' || true

      - name: Publish to npm with provenance (OIDC)
        if: startsWith(github.ref, 'refs/tags/0.')
        run: npm publish --access public --provenance
