name: Publish n8n-nodes-testneo

on:
  push:
    tags:
      - '0.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # isolated-vm (via n8n-workflow) requires Node >= 22; use 24 LTS.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Do not compile native addons — this package has zero runtime deps;
      # we only need TypeScript + types from n8n-workflow for build/test.
      - name: Install
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Show Node version
        run: node -v && npm -v

      - name: Test and build
        run: npm test

      - name: Publish to npm with provenance
        # Only publish on version tags (not workflow_dispatch dry-runs)
        if: startsWith(github.ref, 'refs/tags/0.')
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
