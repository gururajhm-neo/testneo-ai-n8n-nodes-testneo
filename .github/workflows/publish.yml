# Matches npm Trusted Publishers docs:
# https://docs.npmjs.com/trusted-publishers/
name: Publish n8n-nodes-testneo

on:
  push:
    tags:
      - '0.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC Trusted Publisher
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          # never cache on release builds (npm docs recommendation)
          cache: ''

      - name: Upgrade npm (Trusted Publisher needs >= 11.5.1)
        run: npm install -g npm@latest && node -v && npm -v

      - name: Install
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Test and build
        run: npm test

      # NO NODE_AUTH_TOKEN — Trusted Publisher OIDC only.
      # Do not delete .npmrc; setup-node registry-url is required by npm docs.
      - name: Publish to npm (OIDC Trusted Publisher)
        if: startsWith(github.ref, 'refs/tags/0.')
        run: npm publish --access public
