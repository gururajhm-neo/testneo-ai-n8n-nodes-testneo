name: Publish n8n-nodes-testneo

on:
  push:
    tags:
      - '0.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for npm Trusted Publisher (OIDC) + provenance
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # OIDC trusted publishing needs a recent npm CLI
      - name: Upgrade npm
        run: npm install -g npm@latest

      # Skip native builds (isolated-vm from n8n-workflow). Zero runtime deps.
      - name: Install
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Show Node / npm
        run: node -v && npm -v

      - name: Test and build
        run: npm test

      # Do NOT set NODE_AUTH_TOKEN — a bad token forces legacy auth and
      # overrides Trusted Publisher OIDC (causes 403 Forbidden).
      - name: Publish to npm with provenance (OIDC)
        if: startsWith(github.ref, 'refs/tags/0.')
        run: npm publish --access public --provenance
